name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Install actionlint
        run: |
          curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- latest /tmp/actionlint
          sudo mv /tmp/actionlint/actionlint /usr/local/bin/actionlint

      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Bash syntax check
        run: bash -n ginit.sh

      - name: Actionlint
        run: actionlint

      - name: ShellCheck
        run: shellcheck ginit.sh tests/*.sh

      - name: Secrets scan
        run: gitleaks detect --no-git --source . --redact --exit-code 1

      - name: Version flag regression
        run: bash tests/version_flag.sh

      - name: API status regression
        run: bash tests/api_status_regression.sh

      - name: Repo name validation regression
        run: bash tests/repo_name_validation.sh

      - name: Dry-run smoke test
        run: bash tests/dry_run_smoke.sh
